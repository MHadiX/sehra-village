name: Build Content Index

on:
  push:
    branches: [ main ]
    paths:
      - 'content/**'
      - 'settings/**'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Build Content Index
        run: |
          node build-index.js
          
      - name: Commit and Push Index
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content-index.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update content index"
          git push