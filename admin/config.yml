backend:
  name: git-gateway
  branch: main

locale: en
site_url: https://sehravillage.netlify.app
logo_url: /img/icon-192.png

media_folder: "img/uploads"
public_folder: "/img/uploads"

# IMPORTANT: format: json ensures files are saved as .json, not .md
# Without this, Netlify CMS saves as markdown which the site cannot read

collections:
  - name: "settings"
    label: "⚙️ Site Settings"
    description: "Configure site-wide settings"
    files:
      - name: "site"
        label: "General Settings"
        file: "settings/site.json"
        format: json
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Location", name: "location", widget: "string", default: "Sehra Village, AJK, Pakistan" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Province", name: "province", widget: "string", default: "AJK" }
          - { label: "Country", name: "country", widget: "string", default: "Pakistan" }
          - { label: "Population", name: "population", widget: "string", default: "5,000+" }
          - { label: "Years of History", name: "yearsHistory", widget: "string", default: "100+" }
          - { label: "Number of Schools", name: "schools", widget: "string", default: "3" }
          - { label: "Number of Mosques", name: "mosques", widget: "string", default: "1" }
          - { label: "Nearest City", name: "nearestCity", widget: "string", default: "Muzaffarabad" }
          - { label: "Map Latitude", name: "mapLat", widget: "number", value_type: "float", default: 34.37 }
          - { label: "Map Longitude", name: "mapLng", widget: "number", value_type: "float", default: 73.47 }

  - name: "main_cards"
    label: "🏡 Main Page Cards"
    label_singular: "Card"
    folder: "content/main-cards"
    create: true
    format: json
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Icon", name: "icon", widget: "string", default: "🏡" }
      - label: "Icon Background Color"
        name: "iconColor"
        widget: "select"
        options:
          - { label: "Blue", value: "sky" }
          - { label: "Gold/Yellow", value: "gold" }
          - { label: "Green", value: "green" }
      - { label: "Meta Text", name: "meta", widget: "string", required: false }
      - { label: "Display Order", name: "order", widget: "number", default: 1, value_type: "int", min: 1 }

  - name: "news"
    label: "📰 News & Updates"
    label_singular: "News Article"
    folder: "content/news"
    create: true
    format: json
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Content", name: "content", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Development", "Community", "Education", "Health", "Agriculture", "Infrastructure", "Culture", "Sports"]
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss" }
      - { label: "Author", name: "author", widget: "string", default: "Village Council" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "gallery"
    label: "🖼️ Gallery"
    label_singular: "Photo"
    folder: "content/gallery"
    create: true
    format: json
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Photo Date", name: "date", widget: "datetime", required: false }
      - { label: "Display Order", name: "order", widget: "number", default: 1, value_type: "int", min: 1 }
      - { label: "Tags", name: "tags", widget: "list", required: false }

  - name: "notice"
    label: "📢 Notice Board"
    files:
      - name: "current_notice"
        label: "Current Notice"
        file: "content/notice.json"
        format: json
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Notice" }
          - { label: "Content", name: "content", widget: "text" }
          - { label: "Show Notice", name: "enabled", widget: "boolean", default: true }
          - { label: "Updated Date", name: "updated", widget: "datetime", required: false }

  - name: "upcoming"
    label: "🎉 Upcoming Events"
    files:
      - name: "current_upcoming"
        label: "Current Upcoming Event"
        file: "content/upcoming.json"
        format: json
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Upcoming" }
          - { label: "Content", name: "content", widget: "text" }
          - { label: "Show Event", name: "enabled", widget: "boolean", default: true }
          - { label: "Event Date", name: "eventDate", widget: "datetime", required: false }

  - name: "notifications"
    label: "🔔 Push Notifications"
    label_singular: "Notification"
    folder: "content/notifications"
    create: true
    format: json
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Message", name: "message", widget: "text" }
      - label: "Icon"
        name: "icon"
        widget: "select"
        options: ["📰", "🎉", "📢", "⚠️", "✅", "🕌", "🏫", "🌾"]
        default: "📰"
      - { label: "Link URL", name: "url", widget: "string", required: false }
      - { label: "Send Immediately", name: "sendNow", widget: "boolean", default: false }
      - { label: "Created", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss" }
