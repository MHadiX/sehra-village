backend:
  name: github
  repo: mhadix/sehra-village
  branch: main
  
locale: en
site_url: https://mhadix.github.io/sehra-village
logo_url: /sehra-village/img/icon-192.png

media_folder: "img/uploads"
public_folder: "/sehra-village/img/uploads"

collections:
  # Site Settings
  - name: "settings"
    label: "⚙️ Site Settings"
    description: "Configure site-wide settings"
    files:
      - name: "site"
        label: "General Settings"
        file: "settings/site.json"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string", hint: "Name of your village" }
          - { label: "Location", name: "location", widget: "string", default: "Sehra Village, AJK, Pakistan" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Province", name: "province", widget: "string", default: "AJK" }
          - { label: "Country", name: "country", widget: "string", default: "Pakistan" }
          - { label: "Population", name: "population", widget: "string", default: "5,000+", hint: "e.g. 5,000+ or 10,000+" }
          - { label: "Years of History", name: "yearsHistory", widget: "string", default: "100+", hint: "e.g. 100+ or 200+" }
          - { label: "Number of Schools", name: "schools", widget: "string", default: "3" }
          - { label: "Number of Mosques", name: "mosques", widget: "string", default: "1" }
          - { label: "Nearest City", name: "nearestCity", widget: "string", default: "Muzaffarabad" }
          - { label: "Map Latitude", name: "mapLat", widget: "number", value_type: "float", default: 34.37, hint: "Get from Google Maps" }
          - { label: "Map Longitude", name: "mapLng", widget: "number", value_type: "float", default: 73.47, hint: "Get from Google Maps" }
  
  # Main Page Cards
  - name: "main_cards"
    label: "🏡 Main Page Cards"
    label_singular: "Card"
    description: "Edit the 3 main highlight cards on homepage"
    folder: "content/main-cards"
    create: true
    slug: "{{slug}}"
    preview_path: "/"
    identifier_field: title
    sortable_fields: ['order', 'title']
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Card heading" }
      - { label: "Description", name: "description", widget: "text", hint: "Card content (keep it brief)" }
      - { label: "Image", name: "image", widget: "image", hint: "Upload card image (recommended: 600x400px)" }
      - { label: "Icon", name: "icon", widget: "string", default: "🏡", hint: "Emoji icon" }
      - label: "Icon Background Color"
        name: "iconColor"
        widget: "select"
        options:
          - { label: "Blue", value: "sky" }
          - { label: "Gold/Yellow", value: "gold" }
          - { label: "Green", value: "green" }
      - { label: "Meta Text", name: "meta", widget: "string", required: false, hint: "Optional small text below description" }
      - { label: "Display Order", name: "order", widget: "number", default: 1, value_type: "int", min: 1, hint: "Lower numbers appear first" }
  
  # News
  - name: "news"
    label: "📰 News & Updates"
    label_singular: "News Article"
    description: "Manage village news and announcements"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "news"
    identifier_field: title
    sortable_fields: ['date', 'title', 'category']
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "News headline" }
      - { label: "Content", name: "content", widget: "text", hint: "Full news article content" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Development", "Community", "Education", "Health", "Agriculture", "Infrastructure", "Culture", "Sports"]
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss", date_format: "YYYY-MM-DD", time_format: "HH:mm", hint: "When to publish this news" }
      - { label: "Author", name: "author", widget: "string", default: "Village Council" }
      - { label: "Featured Image", name: "image", widget: "image", required: false, hint: "Optional image for this news (recommended: 800x600px)" }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false, hint: "Show on homepage?" }
  
  # Gallery
  - name: "gallery"
    label: "🖼️ Gallery"
    label_singular: "Photo"
    description: "Manage village photo gallery"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    preview_path: "gallery"
    identifier_field: title
    sortable_fields: ['order', 'title']
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Photo title/caption" }
      - { label: "Description", name: "description", widget: "text", hint: "Describe what's in the photo" }
      - { label: "Image", name: "image", widget: "image", hint: "Upload photo (recommended: 1200x800px, max 2MB)" }
      - { label: "Photo Date", name: "date", widget: "datetime", required: false, hint: "When was this photo taken?" }
      - { label: "Display Order", name: "order", widget: "number", default: 1, value_type: "int", min: 1, hint: "Lower numbers appear first" }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Add tags like: nature, people, buildings" }
  
  # Notice Section
  - name: "notice"
    label: "📢 Notice Board"
    description: "Important announcements on news page sidebar"
    files:
      - name: "current_notice"
        label: "Current Notice"
        file: "content/notice.json"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Notice", hint: "Notice heading" }
          - { label: "Content", name: "content", widget: "text", hint: "Notice message" }
          - { label: "Show Notice", name: "enabled", widget: "boolean", default: true, hint: "Turn notice on/off" }
          - { label: "Updated Date", name: "updated", widget: "datetime", required: false }
  
  # Upcoming Events
  - name: "upcoming"
    label: "🎉 Upcoming Events"
    description: "Show upcoming events on news page sidebar"
    files:
      - name: "current_upcoming"
        label: "Current Upcoming Event"
        file: "content/upcoming.json"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Upcoming", hint: "Event heading" }
          - { label: "Content", name: "content", widget: "text", hint: "Event details" }
          - { label: "Show Event", name: "enabled", widget: "boolean", default: true, hint: "Turn event on/off" }
          - { label: "Event Date", name: "eventDate", widget: "datetime", required: false, hint: "When is this event?" }
  
  # Custom Notifications
  - name: "notifications"
    label: "🔔 Push Notifications"
    label_singular: "Notification"
    description: "Send push notifications to all users"
    folder: "content/notifications"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: title
    sortable_fields: ['date', 'title']
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Notification title (keep it short)" }
      - { label: "Message", name: "message", widget: "text", hint: "Notification content" }
      - label: "Icon"
        name: "icon"
        widget: "select"
        options: ["📰", "🎉", "📢", "⚠️", "✅", "🕌", "🏫", "🌾"]
        default: "📰"
      - { label: "Link URL", name: "url", widget: "string", required: false, hint: "Where to go when clicked (optional)" }
      - { label: "Send Immediately", name: "sendNow", widget: "boolean", default: false, hint: "Send to all users now?" }
      - { label: "Created", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss" }